# Despliegue opcional con Serverless Framework: Lambda + API Gateway (HTTP API).
# Alternativas: AWS SAM, CDK, o un contenedor en App Runner/ECS usando src/server.js.
#
#   npm i -g serverless
#   serverless deploy --stage production
#
# Tras desplegar, copia la URL del endpoint a la variable API_BASE del frontend.

service: gpa-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:AWS_REGION, 'us-east-1'}
  stage: ${opt:stage, 'production'}
  memorySize: 512
  timeout: 29
  # VPC: la Lambda corre en subredes privadas con salida a internet por NAT
  # Gateway (para alcanzar el Service Layer de SAP), RDS por red privada, y
  # S3 + Secrets Manager por sus VPC endpoints.
  vpc:
    securityGroupIds:
      - sg-0b2a252911aac2dab
    subnetIds:
      - subnet-0734932e200243119
      - subnet-025d5a97fb2d1c02e
  environment:
    NODE_ENV: production
    CORS_ORIGINS: ${env:CORS_ORIGINS}
    # JWT_SECRET y DATABASE_URL ya NO van en texto plano: la Lambda los carga
    # desde Secrets Manager (SECRETS_ID) en el cold start. Ver src/lambda.js.
    SECRETS_ID: ${env:SECRETS_ID}
    JWT_EXPIRES: ${env:JWT_EXPIRES, '8h'}
    COOKIE_NAME: ${env:COOKIE_NAME, 'gpa_token'}
    COOKIE_DOMAIN: ${env:COOKIE_DOMAIN, ''}
    SAP_SERVICE_LAYER_URL: ${env:SAP_SERVICE_LAYER_URL, ''}
    SAP_COMPANY_DB: ${env:SAP_COMPANY_DB, ''}
    SAP_USER: ${env:SAP_USER, ''}
    SAP_PASSWORD: ${env:SAP_PASSWORD, ''}
    S3_BUCKET: ${env:S3_BUCKET}
    S3_PRESIGN_EXPIRES: ${env:S3_PRESIGN_EXPIRES, '300'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource: 'arn:aws:s3:::${env:S3_BUCKET}/*'
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource: ${env:SECRET_ARN}

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi:
          path: /{proxy+}
          method: '*'
      - httpApi:
          path: /
          method: '*'
