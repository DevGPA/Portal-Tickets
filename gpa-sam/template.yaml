AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  GPA Postventa — Infraestructura serverless completa.
  API Gateway + Lambda (auth, tickets, upload, sap) + Aurora Serverless v2 + S3.

# ══════════════════════════════════════════════════════════════════════════════
# PARÁMETROS
# ══════════════════════════════════════════════════════════════════════════════
Parameters:

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

  JwtSecret:
    Type: String
    NoEcho: true
    Description: Clave secreta JWT (mínimo 32 caracteres random)

  DbPassword:
    Type: String
    NoEcho: true
    Description: Contraseña master de Aurora PostgreSQL

  SapServiceLayerUrl:
    Type: String
    Description: "URL pública de SAP B1 Service Layer. Ej: https://sap.gpa.com.mx/b1s/v1"

  SapCompanyDb:
    Type: String
    Description: Nombre de la empresa en SAP B1

  SapUser:
    Type: String
    NoEcho: true

  SapPassword:
    Type: String
    NoEcho: true

  SmtpHost:
    Type: String
    Description: "Host SMTP de GPA. Ej: mail.gpa.com.mx"

  SmtpPort:
    Type: String
    Default: '587'

  SmtpUser:
    Type: String

  SmtpPassword:
    Type: String
    NoEcho: true

  EmailPostventa:
    Type: String
    Description: Correo interno de Postventa para notificaciones

  CorsOrigin:
    Type: String
    Description: "URL del portal frontend. Ej: https://postventa-gpa.com"

# ══════════════════════════════════════════════════════════════════════════════
# GLOBALS — aplican a todas las funciones Lambda
# ══════════════════════════════════════════════════════════════════════════════
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Layers:
      - !Ref DependenciesLayer
    Environment:
      Variables:
        NODE_ENV:           !Ref Environment
        JWT_SECRET:         !Ref JwtSecret
        CORS_ORIGIN:        !Ref CorsOrigin
        S3_BUCKET:          !Ref ArchivosBucket
        AWS_ACCOUNT_REGION: !Ref AWS::Region
        DB_HOST:            !GetAtt AuroraCluster.Endpoint.Address
        DB_PORT:            '5432'
        DB_NAME:            gpa_postventa
        DB_USER:            gpa_admin
        DB_PASSWORD:        !Ref DbPassword
        # Nombre literal (no !Ref) para evitar que SapFunction se refiera a sí
        # misma vía Globals, lo que generaba una dependencia circular.
        SAP_LAMBDA_NAME:    !Sub gpa-sap-${Environment}
        EMAIL_FROM:         !Sub "GPA Postventa <${SmtpUser}>"
        EMAIL_POSTVENTA:    !Ref EmailPostventa
        SMTP_HOST:          !Ref SmtpHost
        SMTP_PORT:          !Ref SmtpPort
        SMTP_USER:          !Ref SmtpUser
        SMTP_PASSWORD:      !Ref SmtpPassword
  # API Gateway implícita (SAM crea ServerlessRestApi). Se usa la implícita en
  # vez de un AWS::Serverless::Api explícito porque este último provocaba
  # dependencias circulares entre el API, su stage/deployment y los permisos Lambda.
  Api:
    OpenApiVersion: '3.0.1'
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Cookie,Authorization'"
      AllowOrigin: !Sub "'${CorsOrigin}'"
      AllowCredentials: true

# ══════════════════════════════════════════════════════════════════════════════
# RECURSOS
# ══════════════════════════════════════════════════════════════════════════════
Resources:


  # ── Layer de dependencias compartidas ────────────────────────────────────────
  # bcryptjs, jsonwebtoken, pg, nodemailer, node-fetch, uuid, @aws-sdk/*
  # Solo deps JS puras (sin binarios nativos), por lo que sam build las instala
  # en el host sin necesidad de Docker. ContentUri apunta a la carpeta con
  # package.json; con BuildMethod nodejs20.x, SAM las envuelve en nodejs/node_modules.
  DependenciesLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub gpa-dependencies-${Environment}
      Description: Dependencias npm compartidas entre todas las funciones
      ContentUri: layers/nodejs/
      CompatibleRuntimes:
        - nodejs20.x
    Metadata:
      BuildMethod: nodejs20.x

  # ──────────────────────────────────────────────────────────────────────────
  # FUNCIONES LAMBDA
  # ──────────────────────────────────────────────────────────────────────────

  # ── Auth: login, logout, me ──────────────────────────────────────────────────
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub gpa-auth-${Environment}
      # CodeUri en functions/ (no functions/auth/) para incluir shared/.
      CodeUri: functions/
      Handler: auth/index.handler
      Description: Login / logout / me — JWT en cookie HttpOnly
      Events:
        Login:
          Type: Api
          Properties:
            Path: /auth/login
            Method: POST
        Logout:
          Type: Api
          Properties:
            Path: /auth/logout
            Method: POST
        Me:
          Type: Api
          Properties:
            Path: /auth/me
            Method: GET
        Recover:
          Type: Api
          Properties:
            Path: /auth/recover
            Method: POST
        ResetPassword:
          Type: Api
          Properties:
            Path: /auth/reset-password
            Method: POST

  # ── Tickets: crear, listar, detalle ─────────────────────────────────────────
  TicketsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub gpa-tickets-${Environment}
      CodeUri: functions/
      Handler: tickets/index.handler
      Description: CRUD de tickets de postventa
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Sub gpa-sap-${Environment}
      Events:
        CreateTicket:
          Type: Api
          Properties:
            Path: /tickets
            Method: POST
        ListTickets:
          Type: Api
          Properties:
            Path: /tickets
            Method: GET
        GetTicket:
          Type: Api
          Properties:
            Path: /tickets/{id}
            Method: GET
        GetEvidenciaUrl:
          Type: Api
          Properties:
            Path: /tickets/{id}/evidencias/{key}/url
            Method: GET
        BuscarFacturas:
          Type: Api
          Properties:
            Path: /sap/buscar-facturas
            Method: POST
        ArticulosFactura:
          Type: Api
          Properties:
            Path: /sap/articulos-factura
            Method: POST
        Familias:
          Type: Api
          Properties:
            Path: /sap/familias
            Method: GET

  # ── Upload: presigned URL + confirmar subida ─────────────────────────────────
  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub gpa-upload-${Environment}
      CodeUri: functions/
      Handler: upload/index.handler
      Description: Genera URLs prefirmadas de S3 y confirma subidas
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArchivosBucket
      Events:
        PresignedUrl:
          Type: Api
          Properties:
            Path: /upload/presigned-url
            Method: POST
        ConfirmUpload:
          Type: Api
          Properties:
            Path: /upload/confirm
            Method: POST

  # ── SAP: puente con SAP B1 Service Layer ────────────────────────────────────
  SapFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub gpa-sap-${Environment}
      CodeUri: functions/
      Handler: sap/index.handler
      Description: Puente con SAP B1 Service Layer (invocación directa, sin API Gateway)
      Timeout: 30
      # Variables de conexión a SAP (se mergean con las de Globals).
      Environment:
        Variables:
          SAP_SERVICE_LAYER_URL: !Ref SapServiceLayerUrl
          SAP_COMPANY_DB:        !Ref SapCompanyDb
          SAP_USER:              !Ref SapUser
          SAP_PASSWORD:          !Ref SapPassword
      # En VPC con salida por NAT Gateway → Elastic IP fija (lista blanca SAP).
      Policies:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref SapLambdaSecurityGroup
        SubnetIds:
          - !Ref SapPrivateSubnet
      # Sin Events — esta Lambda no está expuesta en API Gateway.
      # Solo la invoca TicketsFunction directamente vía AWS SDK.

  # ──────────────────────────────────────────────────────────────────────────
  # Red para salida fija de la Lambda SAP (NAT Gateway + Elastic IP)
  # Solo SapFunction entra a la VPC; sale a internet por una IP fija que el
  # firewall de SAP autoriza. Las demás Lambdas permanecen fuera de VPC.
  # ──────────────────────────────────────────────────────────────────────────
  SapEgressIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub gpa-sap-egress-${Environment}

  SapNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt SapEgressIp.AllocationId
      SubnetId: subnet-66486447   # subnet pública existente (us-east-1a, ruta a IGW)
      Tags:
        - Key: Name
          Value: !Sub gpa-sap-nat-${Environment}

  SapPrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: vpc-5104762c
      CidrBlock: 172.31.240.0/24   # CIDR libre dentro del VPC default
      AvailabilityZone: us-east-1a
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub gpa-sap-private-${Environment}

  SapPrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: vpc-5104762c

  SapPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref SapPrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref SapNatGateway

  SapPrivateSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SapPrivateSubnet
      RouteTableId: !Ref SapPrivateRouteTable

  SapLambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Egress de la Lambda SAP hacia el Service Layer
      VpcId: vpc-5104762c
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Salida a internet via NAT

  # ──────────────────────────────────────────────────────────────────────────
  # S3 — Bucket de archivos (evidencias)
  # ──────────────────────────────────────────────────────────────────────────
  ArchivosBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub gpa-postventa-archivos-${Environment}-${AWS::AccountId}
      # Acceso completamente privado — archivos solo accesibles con URLs firmadas
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchivarAGlacier
            Status: Enabled
            Transitions:
              - TransitionInDays: 365
                StorageClass: GLACIER
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT]
            AllowedOrigins:
              - !Ref CorsOrigin
            MaxAge: 3600

  # ──────────────────────────────────────────────────────────────────────────
  # Aurora Serverless v2 — PostgreSQL compatible
  # ──────────────────────────────────────────────────────────────────────────

  # Subnet group — Aurora necesita al menos 2 AZs
  AuroraSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnets para Aurora GPA Postventa
      SubnetIds:
        # VPC default de la cuenta 149857424311 (us-east-1) — subnets públicas
        # Las Lambdas NO están en VPC (acceden a Aurora vía endpoint público)
        # Aurora tiene acceso público habilitado + security group restrictivo
        - subnet-66486447   # us-east-1a
        - subnet-2d619761   # us-east-1b

  # Security Group — solo acepta conexiones desde las IPs de Lambda (o abierto con SSL)
  AuroraSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Aurora GPA Postventa - acceso PostgreSQL
      VpcId: vpc-5104762c   # VPC default de la cuenta (us-east-1)
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 0.0.0.0/0   # Restringir a rangos de IP de Lambda si es posible

  # Cluster Aurora Serverless v2
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    Properties:
      DBClusterIdentifier: !Sub gpa-postventa-${Environment}
      Engine:              aurora-postgresql
      EngineVersion:       '15.17'
      EngineMode:          provisioned   # Serverless v2 usa modo "provisioned" con capacidad escalable
      DatabaseName:        gpa_postventa
      MasterUsername:      gpa_admin
      MasterUserPassword:  !Ref DbPassword
      DBSubnetGroupName:   !Ref AuroraSubnetGroup
      VpcSecurityGroupIds:
        - !Ref AuroraSecurityGroup
      # PubliclyAccessible NO aplica a nivel cluster en Aurora — va en la instancia.
      EnableIAMDatabaseAuthentication: false
      BackupRetentionPeriod: 7
      DeletionProtection:  true
      StorageEncrypted:    true
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5   # Se apaga si no hay tráfico (costo mínimo)
        MaxCapacity: 4     # Escala hasta 4 ACUs — suficiente para este volumen

  # Instancia dentro del cluster (Serverless v2 requiere al menos una instancia)
  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceIdentifier: !Sub gpa-postventa-instance-${Environment}
      DBInstanceClass: db.serverless
      Engine: aurora-postgresql
      PubliclyAccessible: true

# ══════════════════════════════════════════════════════════════════════════════
# OUTPUTS — valores útiles post-deploy
# ══════════════════════════════════════════════════════════════════════════════
Outputs:

  ApiUrl:
    Description: URL base del API Gateway — pegar en el frontend como API_BASE
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod
    Export:
      Name: !Sub GpaPostventaApiUrl-${Environment}

  S3BucketName:
    Description: Nombre del bucket S3 de archivos
    Value: !Ref ArchivosBucket

  AuroraEndpoint:
    Description: Endpoint de Aurora — usar en DATABASE_URL de migraciones
    Value: !GetAtt AuroraCluster.Endpoint.Address

  SapFunctionArn:
    Description: ARN de la Lambda SAP (para invocarla directamente)
    Value: !GetAtt SapFunction.Arn

  SapEgressIp:
    Description: IP fija de salida de la Lambda SAP — agregar a la lista blanca del firewall de SAP
    Value: !Ref SapEgressIp
